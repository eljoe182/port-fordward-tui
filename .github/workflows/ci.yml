name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build (Linux amd64 smoke)
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o portfwd-tui ./cmd/portfwd-tui
